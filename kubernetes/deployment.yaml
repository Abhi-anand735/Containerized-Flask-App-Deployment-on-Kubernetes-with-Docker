apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-deployment
  namespace: flask-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

    spec:
      containers:
      - name: flask-container

        image: username/flask-k8s:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: flask-config
